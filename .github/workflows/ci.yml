name: CI

on:
  pull_request:
    branches: [main]

jobs:
  export-gate:
    name: export-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

      - name: Verify export
        run: npm run verify:export
